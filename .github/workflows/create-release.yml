name: Create Release

# Cuts the v2.2.0 tag + GitHub Release. Runs from a push to the release-prep
# branch because remote coding agents cannot push tags or dispatch workflows
# directly; the job is idempotent (skips if the release already exists).
# Also keeps a manual workflow_dispatch trigger for future releases.

on:
  push:
    branches: [claude/review-claude-skills-iDDnb]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create (e.g. v2.3.0)"
        required: true
      target:
        description: "Commit SHA or branch the tag should point at"
        required: true
        default: "main"
      title:
        description: "Release title"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create tag and release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || 'v2.2.0' }}
          TARGET: ${{ github.event.inputs.target || 'ea711ad8ba9beeeb83893a9e4d36d8f2ccc7b066' }}
          TITLE: ${{ github.event.inputs.title || 'v2.2.0 — Token-efficiency round' }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          cat > /tmp/notes.md <<'NOTES'
          AI spend is a real cost for founders — a company subscription can burn through its limits in days when everything runs on a frontier model. This release makes the template cheap to run without touching what it is good at.

          ## Added
          - **Cost-tiered AI team** — `spec-reviewer`, `build-verifier`, and `research-analyst` are pinned to Sonnet; `project-advisor` keeps the session model because judgment is what is worth paying up for. Works across assistants: Claude Code enforces it automatically via agent frontmatter; Copilot and Codex users apply it through their tool's model picker (stated in `AGENTS.md`, which every assistant reads). Haiku was considered for QA and rejected: a false PASS is the most expensive token in the system
          - **AI budget as a house rule** — `/start` asks about AI spend alongside the hosting budget, the example `docs/house_rules.md` shows the rule, and the advisor's operations dimension checks it
          - **README "Keeping your AI costs down"** — model-to-moment guidance, per-tool model switches, and why docs-as-memory is itself token optimization

          ## Changed
          - **`project-advisor` and `/start` read less** — the `AGENTS.md` rosters replace reading every skill/agent file; adapters are read only when the template-consistency dimension runs
          - **Documentation conventions** — docs are context, so length is a running cost: spec and status stay current-state only, history goes to the changelog
          - **Plugin** bumped to 2.2.0 — installed users get the update via `/plugin update`
          NOTES
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$TARGET" \
            --title "$TITLE" \
            --notes-file /tmp/notes.md
