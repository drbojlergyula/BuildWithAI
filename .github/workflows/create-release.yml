name: Create Release

# Manually-triggered helper: tags a commit and publishes a GitHub Release.
# Exists so releases can be cut from environments that cannot push tags
# directly (e.g. remote coding agents with branch-scoped git access).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create (e.g. v2.2.0)"
        required: true
      target:
        description: "Commit SHA or branch the tag should point at"
        required: true
        default: "main"
      title:
        description: "Release title"
        required: true
      notes:
        description: "Release notes (markdown)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.event.inputs.target }}" \
            --title "${{ github.event.inputs.title }}" \
            --notes "${{ github.event.inputs.notes }}"
